name: Bug report
description: Report a defect in the repository skeleton or its tooling.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, `uv`/`npm` versions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (without secrets)
      description: Paste relevant logs. Remove any credentials, tokens, or personal data before pasting.
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true
