name: Verify and Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Generate locks, verify, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Expand PACK-02 verification candidate
      - name: Remove forbidden identity terms from OpenAPI prose
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("contracts/openapi/pack-02.yaml")
          text = path.read_text(encoding="utf-8")

          old = """        The response never contains identity_record_id, person_id,
        account_id, or any other identity field (CT-00-08; enforced
"""

          new = """        The response never contains identity-linked fields
        (CT-00-08; enforced
"""

          if old not in text:
              raise SystemExit("Target OpenAPI description not found")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
        shell: bash
        run: |
          unzip -q -o epd2-civic-os-PACK-02-verification-candidate.zip -d .
          git rm -f --ignore-unmatch epd2-civic-os-PACK-02-verification-candidate.zip
      - name: Patch Hypothesis typing compatibility
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/contract/test_property_based.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          marker = "# type: ignore[arg-type]"

          matches = [
              index
              for index, line in enumerate(lines)
              if "whitelist_categories=" in line
          ]

          if len(matches) != 2:
              raise SystemExit(
                  f"Expected exactly 2 whitelist_categories lines, found {len(matches)}"
              )

          # Remove the ignore marker from both lines first.
          for index in matches:
              lines[index] = lines[index].replace(f"  {marker}", "").replace(marker, "")

          # Add it only to the second occurrence, which is the mypy-incompatible one.
          second = matches[1]
          lines[second] = f"{lines[second]}  {marker}"

          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("Patched only the second whitelist_categories occurrence")
          PY
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Generate Python lock file
        run: uv lock

      - name: Install Python dependencies
        run: uv sync --all-groups --frozen

      - name: Install Node dependencies
        run: npm ci
      - name: Format PACK-02 files
        run: npx prettier --write .
      - name: Run full verification
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          make verify 2>&1 | tee PACK-02-VERIFICATION.log

      - name: Write verification result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.verify.outcome }}" = "success" ]; then
            STATUS="PACK-02 PASS"
          else
            STATUS="PACK-02 FAIL"
          fi

          {
            echo "# PACK-02 Verification"
            echo
            echo "Status: **${STATUS}**"
            echo
            echo "Runner: GitHub Actions / ubuntu-latest"
            echo "Python: 3.12"
            echo "Node.js: 22"
            echo
            echo "Full log: PACK-02-VERIFICATION.log"
          } > PACK-02-RESULT.md

      - name: Create result archive
        if: always()
        shell: bash
        run: |
          rm -rf .venv
          rm -rf node_modules
          rm -rf frontend/web-shell/node_modules
          rm -rf frontend/web-shell/.next
          rm -rf .pytest_cache
          rm -rf .mypy_cache
          rm -rf .ruff_cache

          zip -r epd2-civic-os-PACK-02-result.zip . \
            -x ".git/*" \
            -x "epd2-civic-os-PACK-02-result.zip"

      - name: Upload result archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epd2-civic-os-PACK-02-result
          path: epd2-civic-os-PACK-02-result.zip
          retention-days: 14

      - name: Fail workflow when verification failed
        if: steps.verify.outcome != 'success'
        run: exit 1
