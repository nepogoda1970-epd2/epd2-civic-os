                ]
              properties:
                moderation_case_id: { type: string, format: uuid }
                target_type: { type: string, minLength: 1 }
                target_id: { type: string, format: uuid }
                opened_by: { type: string, format: uuid }
                trigger_type: { type: string, minLength: 1 }
                policy_version: { type: string, minLength: 1 }
      responses:
        "201":
          description: ModerationCase opened; canon's moderation.case_opened event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [case]
                properties:
                  case: { $ref: "../schemas/moderation-case.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "409":
          description: MODERATION_CASE_DUPLICATE_CONFLICT — moderation_case_id already exists with different content.

  /moderation-cases/{moderationCaseId}/assign:
    post:
      operationId: assignModerator
      summary: open -> under_review, recording assigned_moderator
      description: >
        Owned by moderation-service. Maps to
        epd2_moderation_service.application.assign_moderator.
      tags: [moderation-service]
      parameters:
        - name: moderationCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [moderator_id]
              properties:
                moderator_id: { type: string, format: uuid }
      responses:
        "200":
          description: Moderator assigned; canon's moderation.case_assigned event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [case]
                properties:
                  case: { $ref: "../schemas/moderation-case.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such moderation_case_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /moderation-cases/{moderationCaseId}/propose-action:
    post:
      operationId: proposeModerationAction
      summary: under_review -> action_proposed
      description: >
        Owned by moderation-service. Maps to
        epd2_moderation_service.application.propose_action. Canon names
        no domain event for this transition — persist + audit only.
      tags: [moderation-service]
      parameters:
        - name: moderationCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Action proposed; no domain event (persist + audit only, reason_code MODERATION_CASE_STATUS_CHANGED).
          content:
            application/json:
              schema:
                type: object
                required: [case]
                properties:
                  case: { $ref: "../schemas/moderation-case.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such moderation_case_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /moderation-cases/{moderationCaseId}/decisions:
    post:
      operationId: issueModerationDecision
      summary: action_proposed -> decided; creates the immutable ModerationDecision
      description: >
        Owned by moderation-service. Maps to
        epd2_moderation_service.application.issue_decision.
      tags: [moderation-service]
      parameters:
        - name: moderationCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  moderation_decision_id,
                  decision_type,
                  reason_code,
                  policy_reference,
                  decided_by,
                  effective_from,
                  public_explanation,
                ]
              properties:
                moderation_decision_id: { type: string, format: uuid }
                decision_type:
                  type: string
                  enum:
                    [
                      no_action,
                      warning,
                      temporary_hide,
                      restore,
                      participation_limit,
                      account_restriction_request,
                      escalate,
                      remove_from_public_view,
                    ]
                reason_code: { type: string, minLength: 1 }
                policy_reference: { type: string, minLength: 1 }
                decided_by: { type: string, format: uuid }
                effective_from: { type: string, format: date-time }
                effective_until: { type: [string, "null"], format: date-time }
                public_explanation: { type: string }
      responses:
        "201":
          description: ModerationDecision issued; canon's moderation.decision_issued event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [decision]
                properties:
                  decision:
                    { $ref: "../schemas/moderation-decision.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such moderation_case_id.
        "409":
          description: MODERATION_DECISION_DUPLICATE_CONFLICT — moderation_decision_id already exists with different content.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03) — case is not action_proposed.

  /moderation-decisions/{moderationDecisionId}/enforce:
    post:
      operationId: enforceModerationDecision
      summary: Record that an already-issued ModerationDecision has been carried out
      description: >
        Owned by moderation-service. Maps to
        epd2_moderation_service.application.enforce_decision. Does not
        transition ModerationCase.status; ModerationDecision itself has
        no mutable "enforced" flag (before_hash == after_hash by
        construction).
      tags: [moderation-service]
      parameters:
        - name: moderationDecisionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Enforcement recorded; canon's moderation.decision_enforced event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [decision, case]
                properties:
                  decision:
                    { $ref: "../schemas/moderation-decision.schema.json" }
                  case: { $ref: "../schemas/moderation-case.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such moderation_decision_id or its case_id.

  /moderation-decisions/{moderationDecisionId}/appeals:
    post:
      operationId: submitAppeal
      summary: case decided -> appealed; creates a new Appeal in submitted
      description: >
        Owned by moderation-service. Maps to
        epd2_moderation_service.application.submit_appeal.
      tags: [moderation-service]
      parameters:
        - name: moderationDecisionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [appeal_id, submitted_by, grounds]
              properties:
                appeal_id: { type: string, format: uuid }
                submitted_by: { type: string, format: uuid }
                grounds: { type: string, minLength: 1 }
      responses:
        "201":
          description: Appeal submitted; canon's moderation.appeal_submitted event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [appeal, case]
                properties:
                  appeal: { $ref: "../schemas/appeal.schema.json" }
                  case: { $ref: "../schemas/moderation-case.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such moderation_decision_id or its case_id.
        "409":
          description: APPEAL_DUPLICATE_SUBMISSION_CONFLICT — appeal_id already exists with different content.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03) — case is not decided.

  /appeals/{appealId}/decide:
    post:
      operationId: decideAppeal
      summary: Walk submitted -> admissibility_review -> under_review -> outcome; close the case
      description: >
        Owned by moderation-service. Maps to
        epd2_moderation_service.application.decide_appeal. THE SINGLE
        MOST IMPORTANT CHECK IN THIS SERVICE (CT-00-06, canon section
        14.3): reviewer_actor_id must differ from the original
        ModerationDecision.decided_by. outcome=withdrawn is rejected here
        (see domain.FINAL_APPEAL_OUTCOMES).
      tags: [moderation-service]
      parameters:
        - name: appealId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reviewer_actor_id, outcome, result]
              properties:
                reviewer_actor_id: { type: string, format: uuid }
                outcome:
                  type: string
                  enum: [upheld, partially_upheld, rejected]
                result: { type: string }
      responses:
        "200":
          description: Appeal decided; case closed; canon's moderation.appeal_decided event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [appeal, case]
                properties:
                  appeal: { $ref: "../schemas/appeal.schema.json" }
                  case: { $ref: "../schemas/moderation-case.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED — actor unauthorized, or reviewer_actor_id equals the original decision's decided_by (canon 14.3, CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such appeal_id, its decision_id, or its case_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03), or outcome is not one of upheld/partially_upheld/rejected.

  # ==========================================================================
  # voting-service
  # ==========================================================================
  /ballots:
    post:
      operationId: createBallot
      summary: Create a new Ballot in draft
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.create_ballot. Configuration
        fields remain mutable only while status == draft (CT-00-10).
      tags: [voting-service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  ballot_id,
                  space_id,
                  subject_type,
                  subject_id,
                  question,
                  ballot_method,
                  secrecy_mode,
                  eligibility_rule_version,
                  delegation_policy_version,
                  quorum_rule,
                  threshold_rule,
                  opens_at,
                  closes_at,
                ]
              properties:
                ballot_id: { type: string, format: uuid }
                space_id: { type: string, format: uuid }
                subject_type: { type: string, minLength: 1 }
                subject_id: { type: string, format: uuid }
                question: { type: string, minLength: 1 }
                ballot_method:
                  type: string
                  enum: [single_choice, yes_no]
                secrecy_mode: { type: string, minLength: 1 }
                eligibility_rule_version: { type: integer, minimum: 1 }
                delegation_policy_version: { type: integer, minimum: 1 }
                quorum_rule: { type: string }
                threshold_rule: { type: string }
                opens_at: { type: string, format: date-time }
                closes_at: { type: string, format: date-time }
                challenge_window_hours: { type: [integer, "null"], minimum: 0 }
      responses:
        "201":
          description: Ballot created; canon's ballot.created event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "409":
          description: BALLOT_DUPLICATE_CREATION_CONFLICT — ballot_id already exists with different content.

  /ballots/{ballotId}/submit-for-configuration-review:
    post:
      operationId: submitBallotForConfigurationReview
      summary: draft -> configuration_review; freezes configuration_hash (CT-00-10)
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.submit_ballot_for_configuration_review.
        Confirms the referenced EligibilitySnapshot is real via
        epd2_eligibility_service.application.get_eligibility_snapshot
        (ADR-008). Canon names no domain event for this sub-step —
        persist + audit only.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [eligibility_snapshot_id]
              properties:
                eligibility_snapshot_id: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot configuration frozen; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id or eligibility_snapshot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03), or the snapshot's rule_version does not match the ballot's eligibility_rule_version.

  /ballots/{ballotId}/approve-configuration:
    post:
      operationId: approveBallotConfiguration
      summary: configuration_review -> scheduled (second-actor approval, ADR-009 item 7)
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.approve_ballot_configuration.
        The approving actor must differ from the ballot's own creator.
        Emits BOTH ballot.configuration_locked and ballot.scheduled.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot approved and scheduled; canon's ballot.configuration_locked and ballot.scheduled events both emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot, configuration_locked_event, scheduled_event]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  configuration_locked_event:
                    { $ref: "../schemas/event-envelope.schema.json" }
                  scheduled_event:
                    { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED — actor unauthorized, or the actor who created this ballot attempted to approve its own configuration (ADR-009 item 7 / INV-08).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/options:
    post:
      operationId: addBallotOption
      summary: Add one BallotOption while a ballot is still draft
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.add_ballot_option. Per ADR-009
        item 3, abstention is just another option row. Not audited
        (pre-freeze, same reasoning as create_eligibility_rule).
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  ballot_option_id,
                  option_code,
                  label,
                  description,
                  display_order,
                ]
              properties:
                ballot_option_id: { type: string, format: uuid }
                option_code: { type: string, minLength: 1 }
                label: { type: string, minLength: 1 }
                description: { type: string }
                display_order: { type: integer, minimum: 0 }
      responses:
        "201":
          description: BallotOption added.
          content:
            application/json:
              schema:
                type: object
                required: [option]
                properties:
                  option: { $ref: "../schemas/ballot-option.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "409":
          description: BALLOT_CONFIGURATION_LOCKED — ballot.status is no longer draft.

  /ballots/{ballotId}/open:
    post:
      operationId: openBallot
      summary: scheduled -> open; locks every BallotOption for this ballot
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.open_ballot.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot opened; canon's ballot.opened event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot, locked_options]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  locked_options:
                    type: array
                    items: { $ref: "../schemas/ballot-option.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/pause:
    post:
      operationId: pauseBallot
      summary: open -> paused
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.pause_ballot.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot paused; canon's ballot.paused event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/resume:
    post:
      operationId: resumeBallot
      summary: paused -> open
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.resume_ballot.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot resumed; canon's ballot.resumed event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/close:
    post:
      operationId: closeBallot
      summary: open -> closed
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.close_ballot.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot closed; canon's ballot.closed event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/cancel:
    post:
      operationId: cancelBallot
      summary: draft|configuration_review|scheduled -> cancelled
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.cancel_ballot. Per ADR-009 item
        14, an always-available withdrawal path, distinct from the
        structurally-unreachable invalidated status.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot cancelled; canon's ballot.cancelled event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/invalidate:
    post:
      operationId: invalidateBallot
      summary: Invalidate a ballot on the authority of an approved GovernanceDecision
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.invalidate_ballot (PACK-05,
        ADR-017 Option B). voting-service remains the sole writer of
        Ballot — this is the one narrow, additional command that verifies
        an approved, correctly-scoped `ballot_invalidation`
        GovernanceDecision (read via
        epd2_governance_service.application.get_governance_decision /
        is_current_approved_decision — voting-service never writes
        governance-service storage, and governance-service never writes
        Ballot directly) before transitioning the ballot to invalidated.
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [governance_decision_id]
              properties:
                governance_decision_id: { type: string, format: uuid }
      responses:
        "200":
          description: Ballot invalidated; canon's ballot.invalidated event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [ballot]
                properties:
                  ballot: { $ref: "../schemas/ballot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: >-
            PERMISSION_DENIED (CT-00-06), or
            BALLOT_INVALIDATION_NOT_AUTHORIZED — the referenced
            GovernanceDecision is not an approved, non-superseded
            ballot_invalidation decision scoped to this exact ballot_id.
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id or governance_decision_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /ballots/{ballotId}/votes:
    post:
      operationId: castVote
      summary: Cast (or change) a vote on an open ballot
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.cast_vote. credential_proof must
        be the credential_id of an already-issued ballot_access
        ParticipationCredential — never an account_id (canon 15.3,
        CT-00-08/CT-00-09). Validated via
        epd2_credential_service.application.validate_participation_credential
        before any VoteEnvelope is persisted. A pre-close vote change
        supersedes the previous validated envelope and additionally
        emits vote.superseded (ADR-009 items 1-2). This request body,
        and its response, never contain account_id/person_id/
        identity_record_id (CT-00-08).
      tags: [voting-service]
      parameters:
        - name: ballotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  vote_envelope_id,
                  credential_proof,
                  encrypted_or_encoded_choice,
                ]
              properties:
                vote_envelope_id: { type: string, format: uuid }
                credential_proof: { type: string, format: uuid }
                encrypted_or_encoded_choice: { type: string, minLength: 1 }
      responses:
        "201":
          description: Vote received (and any previous validated vote for this credential superseded); canon's vote.received event (and, if applicable, vote.superseded) emitted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [envelope]
                properties:
                  envelope: { $ref: "../schemas/vote-envelope.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
                  superseded_envelope:
                    { $ref: "../schemas/vote-envelope.schema.json" }
                  superseded_event:
                    { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED — actor unauthorized, or the presented credential does not validate for this ballot.
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such ballot_id.
        "409":
          description: BALLOT_NOT_OPEN, BALLOT_ALREADY_CLOSED, or DUPLICATE_VOTE — a genuinely late resubmission attempt for a credential that already has a validated vote (ADR-009 items 1-2), or VOTE_ENVELOPE_DUPLICATE_SUBMISSION_CONFLICT.

  /vote-envelopes/{voteEnvelopeId}/validate:
    post:
      operationId: validateVote
      summary: received -> validated or received -> rejected, by recomputing integrity_hash
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.validate_vote. A structural
        tamper-evidence check only (recomputes integrity_hash); does not
        raise on a hash mismatch — it transitions the VoteEnvelope to
        rejected and emits vote.rejected (reason_codes:
        VOTE_INTEGRITY_HASH_MISMATCH) instead.
      tags: [voting-service]
      parameters:
        - name: voteEnvelopeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Vote validated or rejected; canon's vote.validated or vote.rejected event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [envelope]
                properties:
                  envelope: { $ref: "../schemas/vote-envelope.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such vote_envelope_id.

  /vote-envelopes/{voteEnvelopeId}/receipt:
    post:
      operationId: issueVoteReceipt
      summary: Issue a VoteReceipt for an already-validated/included VoteEnvelope
      description: >
        Owned by voting-service. Maps to
        epd2_voting_service.application.issue_vote_receipt.
        receipt_hash is built only from vote_envelope_id/integrity_hash
        — never encrypted_or_encoded_choice — so the receipt cannot
        reveal the chosen option (canon 15.4). Canon names no domain
        event for receipt issuance — persist + audit only. This request,
        and its response, never contain account_id/person_id/
        identity_record_id (CT-00-08).
      tags: [voting-service]
      parameters:
        - name: voteEnvelopeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [receipt_id]
              properties:
                receipt_id: { type: string, format: uuid }
      responses:
        "201":
          description: VoteReceipt issued; no domain event (persist + audit only, reason_code RECEIPT_ISSUED).
          content:
            application/json:
              schema:
                type: object
                required: [receipt]
                properties:
                  receipt: { $ref: "../schemas/vote-receipt.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such vote_envelope_id.
        "409":
          description: RECEIPT_DUPLICATE_ISSUANCE_CONFLICT — receipt_id already exists with different content.
        "422":
          description: VOTE_ENVELOPE_NOT_RECEIPT_ELIGIBLE — the referenced VoteEnvelope is not validated or included.

  # ==========================================================================
  # tally-service
  # ==========================================================================
  /tallies:
    post:
      operationId: startTally
      summary: Create a new Tally (pending -> running immediately)
      description: >
        Owned by tally-service. Maps to
        epd2_tally_service.application.start_tally. input_set_hash and
        algorithm_version are caller-supplied — tally-service never
        imports epd2_voting_service (ADR-008 item 3); this request never
        contains account_id/person_id/identity_record_id (CT-00-08).
      tags: [tally-service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [tally_id, ballot_id, input_set_hash, algorithm_version]
              properties:
                tally_id: { type: string, format: uuid }
                ballot_id: { type: string, format: uuid }
                input_set_hash: { type: string, minLength: 1 }
                algorithm_version: { type: string, minLength: 1 }
      responses:
        "201":
          description: Tally started; canon's tally.started event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [tally]
                properties:
                  tally: { $ref: "../schemas/tally.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "409":
          description: TALLY_RECORD_CONFLICT — tally_id already exists with different content.

  /tallies/{tallyId}/complete:
    post:
      operationId: completeTally
      summary: running -> completed, recording the caller-computed result
      description: >
        Owned by tally-service. Maps to
        epd2_tally_service.application.complete_tally. This request
        never contains individual vote contents or identity fields
        (CT-00-08, ADR-009 item 15) — only an aggregate per-option count
        breakdown.
      tags: [tally-service]
      parameters:
        - name: tallyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [result_data, invalid_vote_count]
              properties:
                result_data:
                  type: object
                  additionalProperties: { type: integer, minimum: 0 }
                invalid_vote_count: { type: integer, minimum: 0 }
                tally_signature: { type: [string, "null"] }
      responses:
        "200":
          description: Tally completed; canon's tally.completed event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [tally]
                properties:
                  tally: { $ref: "../schemas/tally.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such tally_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION — tally is already completed with content different from this request (not a legitimate CT-00-04 replay).

  /tallies/{tallyId}/verify:
    post:
      operationId: verifyTally
      summary: completed -> verified, or completed -> verification_failed
      description: >
        Owned by tally-service. Maps to
        epd2_tally_service.application.verify_tally. tally.verified is
        emitted only on success — canon names no event for a failed
        verification (persisted and audited as INTEGRITY_CHECK_FAILED
        only, no event field in the response).
      tags: [tally-service]
      parameters:
        - name: tallyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [verification_passed]
              properties:
                verification_passed: { type: boolean }
      responses:
        "200":
          description: Tally verified or marked verification_failed; canon's tally.verified event emitted only on the success path.
          content:
            application/json:
              schema:
                type: object
                required: [tally]
                properties:
                  tally: { $ref: "../schemas/tally.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such tally_id.

  /tallies/{tallyId}/publish-result:
    post:
      operationId: publishResult
      summary: Create a ResultPublication from a verified Tally
      description: >
        Owned by tally-service. Maps to
        epd2_tally_service.application.publish_result. Requires the
        referenced Tally's verification_status == verified.
        quorum_threshold/option_counts/challenge_window_hours are plain
        caller-supplied values (ADR-008 item 3, ADR-010). Per ADR-009
        item 15, this request and its response carry only aggregate
        counts — never account_id/person_id/identity_record_id or
        individual vote contents (CT-00-08).
      tags: [tally-service]
      parameters:
        - name: tallyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  result_publication_id,
                  ballot_id,
                  eligible_count,
                  credential_count,
                  accepted_vote_count,
                  rejected_vote_count,
                  option_counts,
                  audit_package_reference,
                ]
              properties:
                result_publication_id: { type: string, format: uuid }
                ballot_id: { type: string, format: uuid }
                eligible_count: { type: integer, minimum: 0 }
                credential_count: { type: integer, minimum: 0 }
                accepted_vote_count: { type: integer, minimum: 0 }
                rejected_vote_count: { type: integer, minimum: 0 }
                quorum_threshold: { type: [integer, "null"], minimum: 0 }
                option_counts:
                  type: object
                  additionalProperties: { type: integer, minimum: 0 }
                challenge_window_hours: { type: [integer, "null"], minimum: 0 }
                audit_package_reference: { type: string, minLength: 1 }
      responses:
        "201":
          description: Result published (never final — ADR-010); canon's result.published event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result: { $ref: "../schemas/result-publication.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such tally_id, or it does not belong to ballot_id.
        "409":
          description: RESULT_PUBLICATION_RECORD_CONFLICT — result_publication_id already exists with different content.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION — the referenced Tally's verification_status is not verified.

  # ==========================================================================
  # delegation-service
  # ==========================================================================
  /delegations:
    post:
      operationId: createDelegation
      summary: Create a new Delegation in draft
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.create_delegation. Enforces
        canon section 16.1's self-delegation prohibition and ADR-009
        item 9's max-depth-1 rule (checked in both possible creation
        orders) fail-closed before any Delegation is constructed. This
        request, and its response, never contain account_id/person_id/
        identity_record_id (CT-00-08) — only opaque delegator_actor_id/
        delegate_actor_id references.
      tags: [delegation-service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  delegation_id,
                  delegator_actor_id,
                  delegate_actor_id,
                  scope_type,
                  scope_id,
                  valid_from,
                  valid_until,
                  revocation_status,
                ]
              properties:
                delegation_id: { type: string, format: uuid }
                delegator_actor_id: { type: string, format: uuid }
                delegate_actor_id: { type: string, format: uuid }
                scope_type: { type: string, minLength: 1 }
                scope_id: { type: string, format: uuid }
                valid_from: { type: string, format: date-time }
                valid_until: { type: [string, "null"], format: date-time }
                revocation_status: { type: string, minLength: 1 }
      responses:
        "201":
          description: Delegation created; canon's delegation.created event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "409":
          description: DELEGATION_SCOPE_CONFLICT — a competing draft/active Delegation already exists for this (delegator_actor_id, scope_type, scope_id), or DELEGATION_DUPLICATE_CREATION_CONFLICT.
        "422":
          description: DELEGATION_SELF_REFERENCE_FORBIDDEN (delegator_actor_id == delegate_actor_id), or DELEGATION_CYCLE — this delegation would exceed the pilot's maximum delegation depth of 1 (ADR-009 item 9); audited under delegation.cycle_detected even though no Delegation is created.

  /delegations/{delegationId}/activate:
    post:
      operationId: activateDelegation
      summary: draft -> active
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.activate_delegation. Guards
        against activating an already-time-expired draft.
      tags: [delegation-service]
      parameters:
        - name: delegationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delegation activated; canon's delegation.activated event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such delegation_id.
        "422":
          description: DELEGATION_EXPIRED — valid_until has already passed, or VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /delegations/{delegationId}/revoke:
    post:
      operationId: revokeDelegation
      summary: active|suspended -> revoked
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.revoke_delegation.
      tags: [delegation-service]
      parameters:
        - name: delegationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delegation revoked; canon's delegation.revoked event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such delegation_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /delegations/{delegationId}/expire:
    post:
      operationId: expireDelegation
      summary: active -> expired
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.expire_delegation.
      tags: [delegation-service]
      parameters:
        - name: delegationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delegation expired; canon's delegation.expired event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such delegation_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /delegations/{delegationId}/suspend:
    post:
      operationId: suspendDelegation
      summary: active -> suspended
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.suspend_delegation. Canon
        names no domain event for this transition — persist + audit
        only.
      tags: [delegation-service]
      parameters:
        - name: delegationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delegation suspended; no domain event (persist + audit only, reason_code DELEGATION_STATUS_CHANGED).
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such delegation_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /delegations/{delegationId}/unsuspend:
    post:
      operationId: unsuspendDelegation
      summary: suspended -> active
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.unsuspend_delegation. Canon
        names no domain event for this transition — persist + audit
        only.
      tags: [delegation-service]
      parameters:
        - name: delegationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delegation unsuspended; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such delegation_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /delegations/{delegationId}/mark-invalid:
    post:
      operationId: markDelegationInvalid
      summary: draft|active -> invalid
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.mark_delegation_invalid.
        Canon names no domain event for this transition — persist +
        audit only (unlike voting-service's structurally-unreachable
        BallotStatus.INVALIDATED, this IS a real, callable command).
      tags: [delegation-service]
      parameters:
        - name: delegationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delegation marked invalid; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [delegation]
                properties:
                  delegation: { $ref: "../schemas/delegation.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such delegation_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /delegation-snapshots:
    post:
      operationId: resolveDelegationSnapshot
      summary: Resolve one DelegationSnapshot for a ballot
      description: >
        Owned by delegation-service. Maps to
        epd2_delegation_service.application.resolve_delegation_snapshot.
        Never imports epd2_voting_service (ADR-008 item 3) — ballot_id
        is an opaque reference, and direct_voters/delegator_actor_ids are
        plain caller-supplied sets (ADR-009 item 10). Idempotent by
        (ballot_id, input_hash) — a replay with the same inputs but
        different resolved content is rejected (canon prohibition #4).
        This request, and its response, never contain account_id/
        person_id/identity_record_id (CT-00-08) — resolved_weights maps
        an opaque delegate_actor_id to an integer weight only.
      tags: [delegation-service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  ballot_id,
                  policy_version,
                  delegator_actor_ids,
                  scope_type,
                  scope_id,
                  direct_voters,
                ]
              properties:
                delegation_snapshot_id: { type: [string, "null"], format: uuid }
                ballot_id: { type: string, format: uuid }
                policy_version: { type: integer, minimum: 1 }
                delegator_actor_ids:
                  type: array
                  items: { type: string, format: uuid }
                scope_type: { type: string, minLength: 1 }
                scope_id: { type: string, format: uuid }
                direct_voters:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "201":
          description: DelegationSnapshot created (or idempotently re-confirmed); canon's delegation.snapshot_created event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [snapshot]
                properties:
                  snapshot:
                    { $ref: "../schemas/delegation-snapshot.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "409":
          description: DELEGATION_SNAPSHOT_FROZEN — a snapshot already exists for this (ballot_id, input_hash) with different resolved content (canon prohibition #4 — a snapshot may not change after voting has opened).

components: {}
