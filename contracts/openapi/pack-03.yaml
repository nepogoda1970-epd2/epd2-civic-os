        names no domain event for SourceRecord at all — persist + audit
        only.
      tags: [initiative-service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  source_id,
                  source_type,
                  title,
                  publisher,
                  url,
                  added_by_actor_id,
                ]
              properties:
                source_id: { type: string, format: uuid }
                source_type: { type: string, minLength: 1 }
                title: { type: string, minLength: 1 }
                publisher: { type: string }
                publication_date: { type: [string, "null"], format: date-time }
                url: { type: string }
                archive_reference: { type: [string, "null"] }
                added_by_actor_id: { type: string, format: uuid }
                valid_until: { type: [string, "null"], format: date-time }
      responses:
        "201":
          description: SourceRecord created; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [source]
                properties:
                  source: { $ref: "../schemas/source-record.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "409":
          description: SOURCE_RECORD_DUPLICATE_CREATION_CONFLICT — source_id already exists with different content.

  /source-records/{sourceId}/verification-status:
    post:
      operationId: updateSourceVerificationStatus
      summary: Transition a SourceRecord's verification_status
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.update_source_verification_status.
        Canon's hard rule ("an AI actor may not silently promote a
        source's status to human_checked") is enforced structurally
        before any other check. No domain event — persist + audit only.
      tags: [initiative-service]
      parameters:
        - name: sourceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [target_status]
              properties:
                target_status:
                  type: string
                  enum:
                    [
                      unverified,
                      automatically_checked,
                      human_checked,
                      disputed,
                      unavailable,
                      outdated,
                    ]
      responses:
        "200":
          description: SourceRecord verification_status updated; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [source]
                properties:
                  source: { $ref: "../schemas/source-record.schema.json" }
        "403":
          description: PERMISSION_DENIED — actor unauthorized, or an AI actor attempted to promote to human_checked (canon 12.1).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such source_id.
        "422":
          description: VALIDATION_UNKNOWN_STATUS or VALIDATION_FORBIDDEN_TRANSITION (CT-00-02/03).

