openapi: 3.1.0
info:
  title: EPD² Civic OS — CLAUDE-PACK-03 service contracts
  version: "0.1.0"
  description: >
    Transport-neutral API contracts for the six PACK-03 services
    (initiative-service, deliberation-service, moderation-service,
    voting-service, tally-service, delegation-service). No production
    HTTP server ships in this pack — these paths document, one-to-one,
    every real command function in each service's own
    `epd2_*_service.application` module and are exercised in tests via
    those application-layer functions directly, not over HTTP. Every
    path maps to exactly one real command; none of this file's paths
    invent an HTTP surface a command function does not already provide.
    Request bodies list only genuine business fields — actor identity,
    authorization, correlation/causation ids, the clock, and the
    idempotency `event_id` are transport/session concerns, the same
    convention `contracts/openapi/pack-02.yaml` already follows. Per
    CT-00-08 (identity/vote-linkability boundary), no path or schema in
    this file ever declares `account_id`, `person_id`, or
    `identity_record_id` for an initiative-support, voting, tally, or
    delegation path.
externalDocs:
  description: Canonical domain model
  url: ../../docs/canonical/TZ-00-domain-event-canon.md

servers:
  - url: https://initiative.epd2.example
    description: initiative-service (not deployed in PACK-03 — contract only)
  - url: https://deliberation.epd2.example
    description: deliberation-service (not deployed in PACK-03 — contract only)
  - url: https://moderation.epd2.example
    description: moderation-service (not deployed in PACK-03 — contract only)
  - url: https://voting.epd2.example
    description: voting-service (not deployed in PACK-03 — contract only)
  - url: https://tally.epd2.example
    description: tally-service (not deployed in PACK-03 — contract only)
  - url: https://delegation.epd2.example
    description: delegation-service (not deployed in PACK-03 — contract only)

paths:
  # ==========================================================================
  # initiative-service
  # ==========================================================================
  /initiatives:
    post:
      operationId: createInitiative
      summary: Create a new Initiative shell in draft
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.create_initiative. Creates
        the Initiative shell (status=draft, current_version_id=null) -
        canon 11.1.
      tags: [initiative-service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  initiative_id,
                  space_id,
                  author_actor_id,
                  initiative_type,
                  workflow_id,
                ]
              properties:
                initiative_id: { type: string, format: uuid }
                space_id: { type: string, format: uuid }
                author_actor_id: { type: string, format: uuid }
                initiative_type: { type: string, minLength: 1 }
                workflow_id: { type: string, format: uuid }
      responses:
        "201":
          description: Initiative created; canon's initiative.draft_created event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED — actor is not authorized (CT-00-06).
        "409":
          description: INITIATIVE_DUPLICATE_CREATION_CONFLICT — initiative_id already exists with different content.

  /initiatives/{initiativeId}/versions:
    post:
      operationId: createInitiativeVersion
      summary: Create (or idempotently re-confirm) one immutable InitiativeVersion
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.create_initiative_version
        (canon 11.2 — a published version never changes; every edit is a
        new version).
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  initiative_version_id,
                  version_number,
                  title,
                  problem_statement,
                  proposed_solution,
                  affected_groups,
                  expected_effects,
                  risks,
                  estimated_resources,
                  legal_questions,
                  source_references,
                ]
              properties:
                initiative_version_id: { type: string, format: uuid }
                version_number: { type: integer, minimum: 1 }
                title: { type: string, minLength: 1 }
                problem_statement: { type: string }
                proposed_solution: { type: string }
                affected_groups: { type: array, items: { type: string } }
                expected_effects: { type: string }
                risks: { type: string }
                estimated_resources: { type: string }
                legal_questions: { type: string }
                source_references:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "201":
          description: Version created (or idempotently re-confirmed); canon's initiative.version_created event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative, version]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  version: { $ref: "../schemas/initiative-version.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "409":
          description: INITIATIVE_VERSION_FROZEN — (initiative_id, version_number) already exists with different content.

  /initiatives/{initiativeId}/submit:
    post:
      operationId: submitInitiative
      summary: Submit an Initiative (draft or revision_required) for completeness review
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.submit_initiative. Requires
        current_version_id to already be set.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to submitted; canon's initiative.submitted event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: INITIATIVE_HAS_NO_VERSION (no InitiativeVersion yet) or VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/start-completeness-review:
    post:
      operationId: startInitiativeCompletenessReview
      summary: submitted -> completeness_review
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.start_completeness_review.
        Canon names no domain event for this step — persist + audit only.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to completeness_review; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/request-revision:
    post:
      operationId: requestInitiativeRevision
      summary: completeness_review -> revision_required
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.request_revision.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to revision_required; canon's initiative.revision_requested event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/publish:
    post:
      operationId: publishInitiative
      summary: completeness_review -> published
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.publish_initiative.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative published; canon's initiative.published event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/start-support-collection:
    post:
      operationId: startSupportCollection
      summary: published -> support_collection
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.start_support_collection.
        Canon names no domain event for this step — persist + audit only.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to support_collection; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/mark-qualified:
    post:
      operationId: markInitiativeQualified
      summary: support_collection -> qualified
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.mark_qualified.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative marked qualified; canon's initiative.qualified event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/reject:
    post:
      operationId: rejectInitiative
      summary: support_collection|legal_review|voting -> rejected
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.reject_initiative. Canon
        names no domain event for this outcome on Initiative — persist +
        audit only.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative rejected; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/start-deliberation:
    post:
      operationId: startInitiativeDeliberation
      summary: qualified -> deliberation
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.start_deliberation.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to deliberation; canon's initiative.deliberation_started event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/request-legal-review:
    post:
      operationId: requestInitiativeLegalReview
      summary: deliberation -> legal_review
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.request_legal_review.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to legal_review; canon's initiative.legal_review_requested event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/mark-ready-for-ballot:
    post:
      operationId: markInitiativeReadyForBallot
      summary: legal_review -> ready_for_ballot
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.mark_ready_for_ballot.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to ready_for_ballot; canon's initiative.ready_for_ballot event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/start-voting:
    post:
      operationId: startInitiativeVoting
      summary: ready_for_ballot -> voting
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.start_voting. The real
        Ballot lifecycle events belong to voting-service (ADR-008) —
        this step is persist + audit only.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative moved to voting; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/mark-adopted:
    post:
      operationId: markInitiativeAdopted
      summary: voting -> adopted
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.mark_adopted. Canon names no
        domain event for this step — persist + audit only.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative marked adopted; no domain event (persist + audit only).
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/withdraw:
    post:
      operationId: withdrawInitiative
      summary: any pre-voting status -> withdrawn (author's early exit)
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.withdraw_initiative.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative withdrawn; canon's initiative.withdrawn event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/archive:
    post:
      operationId: archiveInitiative
      summary: adopted|rejected|withdrawn -> archived (terminal)
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.archive_initiative.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Initiative archived; canon's initiative.archived event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/support:
    post:
      operationId: addInitiativeSupport
      summary: Record one participant's active support for an initiative
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.add_support. Requires
        Initiative.status == support_collection; validates the presented
        initiative_support credential via
        epd2_credential_service.application.validate_participation_credential
        (ADR-008) before accepting a SupportRecord. support_actor_reference/
        credential_reference are opaque UUID references only — never
        account_id/person_id/identity_record_id (CT-00-08).
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  support_record_id,
                  support_actor_reference,
                  credential_reference,
                ]
              properties:
                support_record_id: { type: string, format: uuid }
                support_actor_reference: { type: string, format: uuid }
                credential_reference: { type: string, format: uuid }
                eligibility_decision_id:
                  { type: [string, "null"], format: uuid }
      responses:
        "201":
          description: Support recorded (or idempotently re-confirmed); canon's initiative.support_added event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative, support]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  support: { $ref: "../schemas/support-record.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED — actor unauthorized, or the presented credential does not validate (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such initiative_id, or (if supplied) no such eligibility_decision_id.
        "409":
          description: DUPLICATE_SUPPORT — the same subject already has an active SupportRecord on this initiative, or SUPPORT_RECORD_DUPLICATE_CREATION_CONFLICT.
        "422":
          description: INITIATIVE_NOT_ACCEPTING_SUPPORT — Initiative.status is not support_collection.

  /support-records/{supportRecordId}/withdraw:
    post:
      operationId: withdrawInitiativeSupport
      summary: active -> withdrawn
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.withdraw_support.
        Decrements Initiative.support_count in the same call.
      tags: [initiative-service]
      parameters:
        - name: supportRecordId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Support withdrawn; canon's initiative.support_withdrawn event emitted.
          content:
            application/json:
              schema:
                type: object
                required: [initiative, support]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
                  support: { $ref: "../schemas/support-record.schema.json" }
                  event: { $ref: "../schemas/event-envelope.schema.json" }
        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such support_record_id or its initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /support-records/{supportRecordId}/invalidate:
    post:
      operationId: invalidateInitiativeSupport
      summary: active -> invalidated
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.invalidate_support. Canon
        names no domain event for this transition — persist + audit
        only.
      tags: [initiative-service]
      parameters:
        - name: supportRecordId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Support invalidated; no domain event (persist + audit only, reason_code SUPPORT_INVALIDATED).
          content:
            application/json:
              schema:
                type: object
                required: [initiative, support]
                properties:
                  initiative: { $ref: "../schemas/initiative.schema.json" }
