        "403":
          description: PERMISSION_DENIED (CT-00-06).
        "404":
          description: VALIDATION_RECORD_NOT_FOUND — no such support_record_id or its initiative_id.
        "422":
          description: VALIDATION_FORBIDDEN_TRANSITION (CT-00-03).

  /initiatives/{initiativeId}/amendments:
    post:
      operationId: createAmendment
      summary: Create a new Amendment in draft
      description: >
        Owned by initiative-service. Maps to
        epd2_initiative_service.application.create_amendment. Canon
        names no domain event for this creation step — persist + audit
        only.
      tags: [initiative-service]
      parameters:
        - name: initiativeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                [
                  amendment_id,
                  target_version_id,
                  proposer_actor_id,
                  proposed_change,
                  justification,
                ]
              properties:
