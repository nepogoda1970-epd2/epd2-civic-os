- code: RESULT_PUBLISHED
  meaning:
    AuditEvent.reason_code classification for the publication of a new ResultPublication
    (INV-04 audit trail; the result remains provisional per ADR-010's finality clarification
    regardless of this classification).
  severity: info
  description: A result was published.
  retryable: false
  owner: tally-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: DELEGATION_SELF_REFERENCE_FORBIDDEN
  meaning:
    A Delegation was attempted with delegator_actor_id == delegate_actor_id (canon
    section 16.1's self-delegation prohibition).
  severity: error
  description: You cannot delegate to yourself.
  retryable: false
  owner: delegation-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: DELEGATION_SCOPE_CONFLICT
  meaning:
    A Delegation was attempted for a (delegator_actor_id, scope_type, scope_id) that
    already has a competing active delegation (canon section 16.1's competing-active-delegation
    prohibition).
  severity: error
  description: You already have an active delegation for this scope.
  retryable: false
  owner: delegation-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: DELEGATION_SNAPSHOT_FROZEN
  meaning:
    A caller attempted to re-submit an existing (ballot_id, input_hash) DelegationSnapshot
    with different content - a snapshot may not change after voting has opened (canon section
    16.1).
  severity: error
  description: This delegation snapshot is frozen and cannot be changed.
  retryable: false
  owner: delegation-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: DELEGATION_DUPLICATE_CREATION_CONFLICT
  meaning:
    A repeated Delegation creation request reused an existing delegation_id with different
    content (CT-00-04 analogue).
  severity: error
  description: A delegation with this identifier already exists with different content.
  retryable: false
  owner: delegation-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: DELEGATION_STATUS_CHANGED
  meaning:
    AuditEvent.reason_code classification for a Delegation status transition that reaches
    a canonical event.
  severity: info
  description: A delegation's status was changed.
  retryable: false
  owner: delegation-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: DELEGATION_SNAPSHOT_CREATED
  meaning: AuditEvent.reason_code classification for the creation of a new DelegationSnapshot.
  severity: info
  description: A delegation snapshot was created.
  retryable: false
  owner: delegation-service
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: BALLOT_INVALIDATION_NOT_AUTHORIZED
  meaning:
    voting-service.invalidate_ballot was called without a currently-approved,
    correctly-scoped ballot_invalidation GovernanceDecision (PACK-05, ADR-017
    Option B) - the caller supplied a governance_decision_id that does not
    resolve to an approved, non-superseded decision whose subject_reference
    names this exact ballot_id.
  severity: error
  description: Ballot invalidation requires an approved, correctly scoped governance decision.
  retryable: false
  owner: voting-service
  introduced_in_version: pack-03-0.2.0
  source: pack-05-adr-017
