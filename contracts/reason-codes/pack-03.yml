# Centralized PACK-03 reason-code registry (ADR-006).
#
# This is the single source of truth for every `reason_code` string
# literal used anywhere in the six PACK-03 services'
# (initiative-service, deliberation-service, moderation-service,
# voting-service, tally-service, delegation-service) `src/`. No PACK-03
# service may use a free-text string in place of a registered code
# (canon section 24: "reason code \u043d\u0435 \u0437\u0430\u043c\u0435\u043d\u044f\u0435\u0442\u0441\u044f \u0441\u0432\u043e\u0431\u043e\u0434\u043d\u044b\u043c \u0442\u0435\u043a\u0441\u0442\u043e\u043c").
#
# This is a SEPARATE registry file from contracts/reason-codes/pack-02.yml
# (ADR-006, Option B - see docs/adr/ADR-006-pack-03-reason-code-additions.md):
# PACK-02's five services and PACK-03's six services each have their own
# reason-code registry; codes that both need (e.g. PERMISSION_DENIED,
# VALIDATION_UNKNOWN_STATUS) are independently redeclared here rather than
# imported from pack-02.yml, so each pack's registry remains a complete,
# standalone source of truth for its own services.
#
# `source: canon` entries are the nine PACK-03-relevant canon section-24
# codes plus five reused shared/generic canon codes, all copied verbatim
# from docs/canonical/TZ-00-domain-event-canon.md section 24, canon
# version 0.2.0 - their meaning must never be changed here without a canon
# ADR and version bump. `source: pack-03-adr-006` entries are additive
# codes introduced by this pack, documented and justified in
# docs/adr/ADR-006-pack-03-reason-code-additions.md; they are
# backward-compatible additions (canon section 25's "Minor" category) and
# change no existing canon code's meaning.
#
# Loaded at runtime by `epd2_core.reason_codes.ReasonCodeRegistry`.
# Validated structurally and scanned for every `reason_code` literal used
# in the six PACK-03 services by `tests/contract/test_reason_codes_registry.py`.

- code: BALLOT_NOT_OPEN
  meaning: An action was attempted against a Ballot that is not currently open for voting.
  severity: error
  description: This ballot is not currently open.
  retryable: true
  owner: Voting Context (voting-service)
  introduced_in_version: 0.1.0
  source: canon
- code: BALLOT_ALREADY_CLOSED
  meaning: An action was attempted against a Ballot that has already closed.
  severity: error
  description: This ballot has already closed.
  retryable: false
  owner: Voting Context (voting-service)
  introduced_in_version: 0.1.0
  source: canon
- code: BALLOT_CONFIGURATION_LOCKED
  meaning:
    A change was attempted to a Ballot's configuration after it opened (canon INV-06
    / CT-00-10 rule freeze).
  severity: error
  description: This ballot's configuration is locked and can no longer be changed.
  retryable: false
  owner: Voting Context (voting-service)
  introduced_in_version: 0.1.0
  source: canon
- code: DUPLICATE_SUPPORT
  meaning: The same subject attempted to support the same initiative more than once.
  severity: error
  description: You have already supported this initiative.
  retryable: false
  owner: Initiative Context (initiative-service)
  introduced_in_version: 0.1.0
  source: canon
- code: DUPLICATE_VOTE
  meaning:
    The same subject attempted to cast a vote on the same ballot more than once after
    the ballot closed (a legitimate pre-close vote change is handled via supersession, not
    this code).
  severity: error
  description: You have already voted on this ballot.
  retryable: false
  owner: Voting Context (voting-service)
  introduced_in_version: 0.1.0
  source: canon
- code: DELEGATION_CYCLE
  meaning:
    The requested delegation would create a cycle in the delegation graph (in this
    pilot's depth-1 cap, this includes any attempt to re-delegate).
  severity: error
  description: This delegation would create a circular chain and cannot be created.
  retryable: false
  owner: Delegation Context (delegation-service)
  introduced_in_version: 0.1.0
  source: canon
- code: DELEGATION_EXPIRED
  meaning: A Delegation was presented or relied upon after its validity period ended.
  severity: error
  description: This delegation has expired.
  retryable: true
  owner: Delegation Context (delegation-service)
  introduced_in_version: 0.1.0
  source: canon
- code: MODERATION_POLICY_VIOLATION
  meaning: Content or an action violated a moderation policy.
  severity: error
  description: This violates the applicable moderation policy.
  retryable: false
  owner: Moderation Context (moderation-service)
  introduced_in_version: 0.1.0
  source: canon
- code: APPEAL_DEADLINE_EXPIRED
  meaning:
    "An Appeal was submitted after its allowed deadline. Reserved in PACK-03: canon
    names this code but gives no deadline field in sections 14.2/14.3, so moderation-service
    does not currently raise it."
  severity: error
  description: The deadline to appeal this decision has passed.
  retryable: false
  owner: Moderation Context (moderation-service)
  introduced_in_version: 0.1.0
  source: canon
- code: PERMISSION_DENIED
  meaning:
    The requesting actor is not authorized to perform the requested command, in any
    bounded context.
  severity: error
  description: You do not have permission to perform this action.
  retryable: false
  owner: shared (all six PACK-03 services)
  introduced_in_version: 0.1.0
  source: canon
- code: EVENT_VERSION_UNSUPPORTED
  meaning: An event or credential carried a major version this reader/validator does not support.
  severity: error
  description: This request uses a version that is no longer supported.
  retryable: false
  owner: shared (event envelope, all six PACK-03 services)
  introduced_in_version: 0.1.0
  source: canon
- code: INTEGRITY_CHECK_FAILED
  meaning:
    A structural or cryptographic integrity check failed (payload hash mismatch, signature
    mismatch, tally verification failure, or equivalent).
  severity: critical
  description: An integrity check failed for this request.
  retryable: false
  owner: shared (tally-service verification, voting-service vote integrity)
  introduced_in_version: 0.1.0
  source: canon
- code: SERVICE_STATE_READ_ONLY
  meaning:
    "The service (or a subsystem of it) is temporarily in a read-only state. Reserved:
    no PACK-03 service currently triggers this condition."
  severity: warning
  description: This service is temporarily read-only; please try again later.
  retryable: true
  owner: Governance Context (reserved, out of PACK-03 scope)
  introduced_in_version: 0.1.0
  source: canon
- code: EMERGENCY_FREEZE_ACTIVE
  meaning:
    "An EmergencyAction freeze is active and forbids the requested operation (CT-00-12).
    Reserved: no PACK-03 service currently triggers this condition (EmergencyAction is out
    of this pack's scope)."
  severity: critical
  description: An emergency freeze is currently active; this action is temporarily unavailable.
  retryable: true
  owner: Governance Context (reserved, out of PACK-03 scope)
  introduced_in_version: 0.1.0
  source: canon
- code: VALIDATION_UNKNOWN_STATUS
  meaning:
    A status/verification-status/decision-value string outside the entity's defined
    enum was supplied (CT-00-02). Mirrors pack-02-adr-004's additive code of the same name,
    redeclared here per ADR-006 since pack-03.yml is its own registry file.
  severity: error
  description: The status value provided is not recognized.
  retryable: false
  owner: shared (all six PACK-03 services)
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: VALIDATION_FORBIDDEN_TRANSITION
  meaning:
    The requested status transition is not present in the entity's allowed-transition
    table (CT-00-03). Mirrors pack-02-adr-004's additive code of the same name.
  severity: error
  description: This status change is not allowed from the entity's current status.
  retryable: false
  owner: shared (all six PACK-03 services)
  introduced_in_version: pack-03-0.1.0
  source: pack-03-adr-006
- code: VALIDATION_RECORD_NOT_FOUND
  meaning:
